<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <!-- Link to external CSS files if needed: -->
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
    <!-- The visible content of the web page goes here -->
    <canvas id="myCanvas" width="1200" height="400" style="border:1px solid #000000;">
    </canvas>

    <script>
        var c = document.getElementById("myCanvas");
        var ctx = c.getContext("2d");
        
        function drawCircle(){
            ctx.clearRect(50, 5, 90, 90)
            ctx.beginPath();
            ctx.arc(95, 50, 40, 0, 2 * Math.PI);
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(95, 50, 20, 0, 2 * Math.PI);
        ctx.stroke();

        drawCircle();
        setTimeout(drawCircle, 10000);
    </script>
</body>
</html>
